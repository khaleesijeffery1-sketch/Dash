<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TradeX PRO V5 AI Terminal</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0e17;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:15px 25px;
background:#111522;
border-bottom:1px solid #1f2740;
}

header h1{
color:#57d6ff;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
padding:20px;
}

.stat{
background:#141a2e;
padding:15px;
border-radius:10px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:3fr 1fr;
gap:20px;
padding:20px;
}

.panel{
background:#141a2e;
padding:18px;
border-radius:10px;
}

input,select{
width:100%;
padding:8px;
margin-top:6px;
border:none;
border-radius:5px;
background:#0e1324;
color:white;
}

button{
background:linear-gradient(45deg,#00c3ff,#0066ff);
border:none;
padding:10px;
margin-top:8px;
border-radius:6px;
color:white;
cursor:pointer;
width:100%;
}

canvas{
height:260px !important;
}

#history{
max-height:250px;
overflow:auto;
}

</style>

</head>

<body>

<header>
<h1>TradeX PRO V5</h1>
<div>Status: <span id="status">Disconnected</span></div>
</header>

<div class="stats">

<div class="stat"><p>Profit</p><h2>$<span id="profit">0</span></h2></div>
<div class="stat"><p>Wins</p><h2 id="wins">0</h2></div>
<div class="stat"><p>Losses</p><h2 id="losses">0</h2></div>
<div class="stat"><p>Balance</p><h2>$<span id="balance">0</span></h2></div>
<div class="stat"><p>Trades</p><h2 id="trades">0</h2></div>

</div>

<div class="grid">

<div>

<div class="panel">
<h3>Market Price</h3>
<canvas id="priceChart"></canvas>
</div>

<div class="panel">
<h3>RSI</h3>
<canvas id="rsiChart"></canvas>
</div>

<div class="panel">
<h3>MACD</h3>
<canvas id="macdChart"></canvas>
</div>

<div class="panel">
<h3>Profit Curve</h3>
<canvas id="profitChart"></canvas>
</div>

</div>

<div class="panel">

<h3>Bot Controls</h3>

<input id="token" type="password" placeholder="Deriv API Token">

<button onclick="connectAPI()">Connect</button>

<select id="market">
<option value="R_25">Volatility 25</option>
<option value="R_50">Volatility 50</option>
<option value="R_75">Volatility 75</option>
<option value="R_100">Volatility 100</option>
</select>

<input id="stake" type="number" value="1">
<input id="duration" type="number" value="30">

<label>Stop Loss</label>
<input id="stoploss" type="number" value="50">

<label>Take Profit</label>
<input id="takeprofit" type="number" value="50">

<label>Max Trades</label>
<input id="maxTrades" type="number" value="100">

<label>Martingale</label>
<select id="martingale">
<option value="off">OFF</option>
<option value="on">ON</option>
</select>

<button onclick="startBot()">Start Bot</button>
<button onclick="stopBot()">Stop Bot</button>

<p id="botStatus">Stopped</p>

<hr>

<h3>Win / Loss</h3>
<canvas id="winChart"></canvas>

<hr>

<h3>Trade History</h3>
<ul id="history"></ul>

</div>

</div>

<script>

let ws
let botRunning=false

let prices=[]
let rsiPeriod=14

let wins=0
let losses=0
let trades=0

let totalProfit=0
let balance=0

let stake=1
let lossStreak=0
let cooldown=false

const priceChart=new Chart(
document.getElementById("priceChart"),
{type:'line',data:{labels:[],datasets:[{data:[],borderColor:'#57d6ff'}]},options:{animation:false}}
)

const rsiChart=new Chart(
document.getElementById("rsiChart"),
{type:'line',data:{labels:[],datasets:[{data:[],borderColor:'orange'}]},options:{animation:false}}
)

const macdChart=new Chart(
document.getElementById("macdChart"),
{type:'line',data:{labels:[],datasets:[{data:[],borderColor:'cyan'}]},options:{animation:false}}
)

const profitChart=new Chart(
document.getElementById("profitChart"),
{type:'line',data:{labels:[],datasets:[{data:[],borderColor:'#3cffb3'}]},options:{animation:false}}
)

const winChart=new Chart(
document.getElementById("winChart"),
{type:'doughnut',data:{labels:['Wins','Losses'],datasets:[{data:[0,0],backgroundColor:['green','red']}]}}
)

function connectAPI(){

let token=document.getElementById("token").value

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089")

ws.onopen=function(){

document.getElementById("status").innerText="Connected"

ws.send(JSON.stringify({authorize:token}))

}

ws.onmessage=function(msg){

let data=JSON.parse(msg.data)

if(data.msg_type==="authorize"){

balance=data.authorize.balance
document.getElementById("balance").innerText=balance

}

if(data.msg_type==="tick"){

updatePrice(data.tick.quote)

}

if(data.msg_type==="proposal_open_contract"){

if(data.proposal_open_contract.is_sold){

recordTrade(data.proposal_open_contract.profit)

cooldown=false

}

}

}

}

function startBot(){

botRunning=true
stake=parseFloat(document.getElementById("stake").value)

let market=document.getElementById("market").value

ws.send(JSON.stringify({
ticks:market,
subscribe:1
}))

}

function stopBot(){

botRunning=false
document.getElementById("botStatus").innerText="Stopped"

}

function updatePrice(price){

prices.push(price)

if(prices.length>200) prices.shift()

priceChart.data.labels.push("")
priceChart.data.datasets[0].data.push(price)

priceChart.update()

let rsi=calculateRSI()

if(rsi){

updateRSI(rsi)
runStrategy(rsi)

}

}

function calculateRSI(){

if(prices.length<rsiPeriod) return

let gains=0
let losses=0

for(let i=prices.length-rsiPeriod;i<prices.length-1;i++){

let diff=prices[i+1]-prices[i]

if(diff>0) gains+=diff
else losses+=Math.abs(diff)

}

let rs=gains/losses

return 100-(100/(1+rs))

}

function updateRSI(rsi){

rsiChart.data.labels.push("")
rsiChart.data.datasets[0].data.push(rsi)

rsiChart.update()

}

function runStrategy(rsi){

if(!botRunning) return
if(cooldown) return

let stoploss=document.getElementById("stoploss").value
let takeprofit=document.getElementById("takeprofit").value
let maxTrades=document.getElementById("maxTrades").value

if(trades>=maxTrades) stopBot()

if(totalProfit<=-stoploss) stopBot()
if(totalProfit>=takeprofit) stopBot()

if(rsi<30){

executeTrade("CALL")

}

if(rsi>70){

executeTrade("PUT")

}

}

function executeTrade(type){

cooldown=true

ws.send(JSON.stringify({

buy:1,
price:stake,

parameters:{
amount:stake,
basis:"stake",
contract_type:type,
currency:"USD",
duration:document.getElementById("duration").value,
duration_unit:"s",
symbol:document.getElementById("market").value
}

}))

trades++
document.getElementById("trades").innerText=trades

}

function recordTrade(result){

totalProfit+=result
balance+=result

if(result>0){

wins++
lossStreak=0
stake=parseFloat(document.getElementById("stake").value)

}else{

losses++
lossStreak++

if(document.getElementById("martingale").value==="on"){

stake=stake*2

}

}

document.getElementById("profit").innerText=totalProfit.toFixed(2)
document.getElementById("wins").innerText=wins
document.getElementById("losses").innerText=losses
document.getElementById("balance").innerText=balance.toFixed(2)

profitChart.data.labels.push("")
profitChart.data.datasets[0].data.push(totalProfit)
profitChart.update()

winChart.data.datasets[0].data=[wins,losses]
winChart.update()

addHistory(result)

}

function addHistory(p){

let li=document.createElement("li")

li.style.color=p>0?"lime":"red"
li.innerText="Trade Result: "+p

document.getElementById("history").prepend(li)

}

</script>

</body>
</html>
